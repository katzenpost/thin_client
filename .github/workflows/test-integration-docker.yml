name: Integration Tests with Docker Mixnet

on:
  pull_request:
    branches: [ main, master, update_python_pigeonhole ]

jobs:
  test-integration-docker:
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout thinclient repository
        uses: actions/checkout@v4
        with:
          path: thinclient

      - name: Checkout katzenpost repository
        uses: actions/checkout@v4
        with:
          repository: katzenpost/katzenpost
          ref: d00ebbda71c41e3a2683a01087e3de550daf2b1f
          path: katzenpost

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Configure podman socket
        run: |
          systemctl --user start podman.socket

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Install thinclient dependencies
        run: |
          cd thinclient
          python -m pip install --upgrade pip
          pip install -e .[test]

      - name: Log in to GitHub Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u "${{ github.actor }}" --password-stdin || true

      - name: Build and start the mixnet
        run: |
          cd katzenpost/docker && make start wait

      - name: Brief pause to ensure mixnet is fully ready
        run: sleep 30

      - name: Run Python integration tests
        timeout-minutes: 60
        run: |
          cd thinclient
          python -m pytest tests/ -vvv -s --tb=short --timeout=1200 -n 1

      # Rust integration tests temporarily disabled — re-enable once
      # the Python side is stable under the serialized (-n 1) pytest run.
      # - name: Run Rust integration tests
      #   timeout-minutes: 60
      #   run: |
      #     cd thinclient
      #     cargo test --test '*' -- --nocapture --test-threads=5

      - name: Stop the mixnet
        if: always()
        run: |
          cd katzenpost/docker && make stop

      - name: Upload testnet state
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mixnet-${{ github.run_id }}-${{ github.job }}
          path: |
            katzenpost/docker/voting_mixnet/*/*.log
